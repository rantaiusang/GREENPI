<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Force Clean Payment</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
body{ font-family:sans-serif; background:#0f172a; color:white; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
.container{ text-align:center; background:#1e293b; padding:30px; border-radius:15px; width:90%; max-width:350px; }
button{ width:100%; padding:15px; border:none; border-radius:10px; margin-top:10px; font-weight:bold; cursor:pointer; color:white; }
#authBtn{ background:#7b2cbf; }
#payBtn{ background:#10b981; }
#status{ margin-top:15px; font-size:12px; background:#000; padding:10px; border-radius:5px; min-height:60px; white-space:pre-line; }
</style>
</head>
<body>

<div class="container">
<h2>Clean Payment Test</h2>
<div id="status">Inisialisasi...</div>
<button id="authBtn">1. Login (Wajib Baru)</button>
<button id="payBtn" disabled>2. Bayar 0.01 Pi</button>
</div>
<script>
const APP_ID = "26949299605f32";
let Pi = window.Pi;
let authResult = null;

const statusDiv = document.getElementById("status");
const authBtn = document.getElementById("authBtn");
const payBtn = document.getElementById("payBtn");

function log(msg) { 
    statusDiv.innerText = msg; 
    console.log(msg); 
}

window.addEventListener("load", async () => {
    if(!Pi) return log("❌ Buka di Pi Browser!");
    
    try {
        await Pi.init({ version: "2.0", sandbox: false });
        
        // Reset session lama
        localStorage.removeItem("greenproof_user");
        log("Session di-reset. Silakan Login Ulang.");
        authBtn.disabled = false;

    } catch (e) { 
        log("❌ Init Error: " + e.message); 
    }
});

authBtn.addEventListener("click", async () => {
    authBtn.disabled = true;
    authBtn.innerText = "Meminta Izin...";
    log("🔄 Membuka popup Auth...");

    try {
        // PASTIKAN KLIK APPROVE DI POPUP
        authResult = await Pi.authenticate(["username", "payments"], {
            onIncompletePaymentFound: (p) => console.log("Pending:", p)
        });

        localStorage.setItem("greenproof_user", JSON.stringify({
            uid: authResult.user.uid,
            username: authResult.user.username,
            token: authResult.accessToken
        }));

        log("✅ Login SUKSES!\nUser: " + authResult.user.username);
        payBtn.disabled = false;
        payBtn.innerText = "💎 Bayar 0.01 Pi";
        authBtn.innerText = "✅ Siap";

    } catch (e) {
        log("❌ Auth Gagal: " + e.message);
        authBtn.disabled = false;
        authBtn.innerText = "Coba Lagi";
    }
});

payBtn.addEventListener("click", async () => {
    if(!authResult) {
        log("❌ Belum login.");
        return; 
    }
    
    payBtn.disabled = true;
    payBtn.innerText = "⏳ Proses Bayar...";
    log("🔄 Membuat Payment...");

    try {
        // --- PERBAIKAN DI SINI (Struktur Kurung Kurawal) ---
        const payment = await Pi.createPayment({
            amount: 0.01,
            memo: "Clean Payment Test Fixed",
            metadata: { userId: authResult.user.uid }
        }, {
            // Callback 1
            onReadyForServerApproval: (paymentId) => {
                log("✅ Payment ID: " + paymentId + "\nSilakan Approve di Popup!");
                payBtn.innerText = "Tunggu Approve...";
            },
            // Callback 2
            onCompleted: (paymentId, txid) => {
                log("🎉 PEMBAYARAN SUKSES!\nTxID: " + txid);
                payBtn.innerText = "✅ Selesai";
                payBtn.style.background = "#059669";
            },
            // Callback 3
            onCancelled: (paymentId) => {
                log("⚠️ Dibatalkan User.");
                payBtn.disabled = false;
                payBtn.innerText = "Coba Lagi";
            },
            // Callback 4
            onError: (error, payment) => {
                log("❌ Error Payment:\n" + error.message);
                payBtn.disabled = false;
                payBtn.innerText = "Coba Lagi";
            }
        }); // <-- PENUTUP OBJECT YANG HILANG SEBELUMNYA

    } catch (error) {
        console.error(error);
        log("❌ Gagal Create Payment:\n" + error.message);
        payBtn.disabled = false;
        payBtn.innerText = "Coba Lagi";
    }
});
</script>

</body>
</html>
