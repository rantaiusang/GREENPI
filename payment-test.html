<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Transaction - GreenProof</title>

<!-- Pi SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

button{
    padding:15px 30px;
    border:none;
    border-radius:50px;
    background:#7b2cbf;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5a189a;
}

#status{
    margin-top:20px;
    font-size:14px;
    white-space:pre-line;
}
</style>

</head>
<body>

<div class="container">
<h2>Test Transaction</h2>
<p>Klik untuk kirim 0.01 Pi</p>

<button id="payBtn">Bayar 0.01 Pi</button>

<div id="status"></div>
</div>

<script>

/* =========================
   CONFIG
========================= */

const APP_ID = "26949299605f32";
let sdkReady = false;
let userAuthenticated = false;

/* =========================
   INIT SDK + LOGIN (WAJIB ADA PAYMENTS SCOPE)
========================= */

window.addEventListener("load", async () => {

    const status = document.getElementById("status");

    try {

        const Pi = window.Pi;
        if(!Pi){
            status.innerText =
            "❌ Pi SDK tidak ditemukan.\nBuka di Pi Browser.";
            return;
        }

        // INIT SDK dengan appId
        await Pi.init({
            version: "2.0",
            sandbox: true
        });

        // AUTH DENGAN PAYMENTS SCOPE
        const auth = await Pi.authenticate(
            ["username", "payments"],
            {
                onIncompletePaymentFound: (payment) => {
                    console.log("Incomplete Payment:", payment);
                }
            }
        );

        console.log("Auth Success:", auth);

        sdkReady = true;
        userAuthenticated = true;

        status.innerText =
        "✅ SDK Ready\n✅ Login Sukses\nUser: " +
        auth.user.username;

    } catch(err){
        console.error(err);
        status.innerText =
        "❌ Init / Auth Gagal:\n" + err.message;
    }

});


/* =========================
   PAYMENT BUTTON
========================= */

document.getElementById("payBtn").addEventListener("click", async () => {

    const status = document.getElementById("status");

    if(!sdkReady || !userAuthenticated){
        alert("Login belum siap");
        return;
    }

    status.innerText = "⏳ Memproses pembayaran...";

    try {

        const payment = await Pi.createPayment({
            amount: 0.01,
            memo: "Test Transaction GreenProof",
            metadata: {
                test: true,
                timestamp: Date.now()
            }
        });

        console.log("Payment Success:", payment);

        status.innerText =
        "✅ Payment Berhasil!\n\n" +
        "Payment ID:\n" + payment.identifier;

    } catch(error){

        console.error("Payment Error:", error);

        status.innerText =
        "❌ Payment Gagal:\n" + error.message;
    }

});

</script>

</body>
</html>
