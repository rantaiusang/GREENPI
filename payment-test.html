    console.log(msg);

        // Init SDK (Pastikan false jika sudah di Production Domain)

        authBtn.disabled = false;
        log("✅ Siap. Silakan klik '1. Login & Auth'");

    } catch (e) {
        log("❌ Init Error: " + e.message);
    }
});

    authBtn.disabled = true;
    authBtn.innerText = "Memproses Auth...";
    log("Membuka popup autentikasi...");

        // Authenticate dengan scope payments (WAJIB)
        authResult = await Pi.authenticate(["username", "payments"], {
            onIncompletePaymentFound: (payment) => {
                log("⚠️ Pembayaran tertunda ditemukan: " + payment.identifier);
            }
        });

        log("✅ Auth Sukses!\nUser: " + authResult.user.username + "\nKlik tombol Bayar (hijau).");
        payBtn.disabled = false;
        authBtn.innerText = "✅ Login Sukses";

    } catch (e) {
        log("❌ Auth Gagal: " + e.message);
        authBtn.disabled = false;
        authBtn.innerText = "Coba Login Lagi";
    }
});
