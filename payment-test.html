<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Payment - Corrected v2.0</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
body{ font-family: sans-serif; background:#0f172a; color:white; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
.container{ text-align:center; background:#1e293b; padding:30px; border-radius:20px; width:90%; max-width:380px; }
button{ width:100%; padding:14px; border:none; border-radius:50px; margin-top:15px; font-weight:bold; cursor:pointer; color:white; }
#authBtn{ background:#7b2cbf; }
#payBtn{ background:#10b981; }
#status{ margin-top:20px; font-size:13px; background:#000; color:#10b981; padding:12px; border-radius:8px; min-height:60px; white-space:pre-line; font-family:monospace; }
</style>
</head>
<body>

<div class="container">
<h2>Pi Payment v2.0</h2>
<button id="authBtn" disabled>1. Login (Scope: Payments)</button>
<button id="payBtn" disabled>2. Bayar 0.01 Pi</button>
<div id="status">Memuat...</div>
</div>

<script>
const APP_ID = "26949299605f32";
let Pi = window.Pi;
let authResult = null;

const statusDiv = document.getElementById("status");
const authBtn = document.getElementById("authBtn");
const payBtn = document.getElementById("payBtn");

function log(msg) { statusDiv.innerText = msg; console.log(msg); }

window.addEventListener("load", async () => {
    if(!Pi) return log("❌ Buka di Pi Browser");
    try {
        await Pi.init({ version: "2.0", sandbox: false });
        localStorage.removeItem("greenproof_user");
        log("✅ SDK v2.0 Ready.\nLogin dulu ya.");
        authBtn.disabled = false;
    } catch(e) { log("Init Error: " + e.message); }
});

authBtn.addEventListener("click", async () => {
    authBtn.disabled = true;
    try {
        authResult = await Pi.authenticate(["username", "payments"], {
            onIncompletePaymentFound: (p) => console.log(p)
        });
        localStorage.setItem("greenproof_user", JSON.stringify({
            uid: authResult.user.uid,
            username: authResult.user.username,
            token: authResult.accessToken
        }));
        log("✅ Auth Sukses!\nUser: " + authResult.user.username);
        payBtn.disabled = false;
    } catch(e) { log("Auth Gagal: " + e.message); authBtn.disabled = false; }
});

payBtn.addEventListener("click", async () => {
    if(!authResult) return log("❌ Login dulu!");
    payBtn.disabled = true;
    log("🔄 Memproses...");

    try {
        // --- CALLBACKS YANG SUDAH DIPERBAIKI NAMANYA ---
        const paymentCallbacks = {
            // 1. Dipanggil saat User Approve di Popup
            onReadyForServerApproval: (paymentId) => {
                log("✅ Approved oleh User.\nPayment ID: " + paymentId);
                // Disini seharusnya kirim paymentId ke Backend untuk /approve
            },

            // 2. Dipanggil setelah Backend melakukan /complete
            onReadyForServerCompletion: (paymentId, txid) => {
                log("🎉 SIAP COMPLETION!\nTxID: " + txid);
                payBtn.innerText = "✅ Selesai";
                // Disini status pembayaran berubah jadi 'COMPLETED'
            },

            // 3. User Batalkan
            onCancel: (paymentId) => {
                log("⚠️ Dibatalkan User.");
                payBtn.disabled = false;
            },

            // 4. Error Sistem
            onError: (error, payment) => {
                log("❌ Error: " + error.message);
                payBtn.disabled = false;
            }
        };

        const payment = await Pi.createPayment({
            amount: 0.01,
            memo: "Corrected Callback Test",
            metadata: { userId: authResult.user.uid }
        }, paymentCallbacks);

    } catch (error) {
        log("❌ Gagal: " + error.message);
        payBtn.disabled = false;
    }
});
</script>
</body>
</html>
