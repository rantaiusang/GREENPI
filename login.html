<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login - GreenProof Pro</title>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=stylesheet" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- CONFIG -->
<script src="js/pi-config.js"></script>

<!-- SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root {
--primary:#10b981;
--pi-purple:#7b2cbf;
--pi-purple-dark:#5a189a;
--bg-gradient:linear-gradient(135deg,#f0fdf4 0%,#e0e7ff 100%);
--glass-bg:rgba(255,255,255,0.9);
--text-main:#1e293b;
--text-muted:#64748b;
--error:#ef4444;
--success:#10b981;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:var(--bg-gradient);
position:relative;
overflow:hidden;
}

.bg-shape{
position:absolute;
border-radius:50%;
filter:blur(80px);
z-index:0;
animation:float 10s infinite ease-in-out;
}

.shape-1{
width:400px;
height:400px;
background:rgba(16,185,129,0.2);
top:-100px;
left:-100px;
}

.shape-2{
width:300px;
height:300px;
background:rgba(123,44,191,0.15);
bottom:-50px;
right:-50px;
animation-delay:2s;
}

@keyframes float{
0%,100%{transform:translate(0,0);}
50%{transform:translate(20px,30px);}
}

.login-card{
position:relative;
z-index:10;
background:var(--glass-bg);
backdrop-filter:blur(20px);
padding:40px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
width:90%;
max-width:400px;
text-align:center;
}

.logo-icon{
font-size:3rem;
color:var(--primary);
margin-bottom:15px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.1);}
}

h1{font-size:1.5rem;color:var(--text-main);margin-bottom:10px;}
p.subtitle{color:var(--text-muted);font-size:.9rem;margin-bottom:25px;}

.btn-pi{
background:var(--pi-purple);
color:white;
border:none;
padding:14px;
border-radius:12px;
font-weight:600;
cursor:pointer;
width:100%;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
transition:.3s;
}

.btn-pi:hover{
background:var(--pi-purple-dark);
transform:translateY(-2px);
}

.btn-pi:disabled{
background:#cbd5e1;
cursor:not-allowed;
transform:none;
}

.spinner{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,.3);
border-top-color:white;
border-radius:50%;
animation:spin .8s linear infinite;
display:none;
}

.loading .spinner{display:block;}

@keyframes spin{to{transform:rotate(360deg);}}

</style>
</head>
<body>

<div class="bg-shape shape-1"></div>
<div class="bg-shape shape-2"></div>

<div class="login-card">
<div class="logo-icon"><i class="fas fa-leaf"></i></div>
<h1>GreenProof Login</h1>
<p class="subtitle">Hubungkan dompet Pi untuk melanjutkan.</p>

<button id="btn-login" class="btn-pi">
<span id="btn-text"><i class="fab fa-pi"></i> Masuk dengan Pi</span>
<div class="spinner"></div>
</button>

<div id="status-msg" style="margin-top:15px;font-size:.8rem;color:#64748b;min-height:20px;"></div>
</div>

<script>
/* ===============================
   0. VARIABLES & ELEMENTS
================================*/
let _supabaseClient = null;
let piReady = false;

const btn = document.getElementById("btn-login");
const btnText = document.getElementById("btn-text");
const statusMsg = document.getElementById("status-msg");

function setStatus(msg, type = "normal") {
    statusMsg.innerText = msg;
    statusMsg.style.color =
        type === "error" ? "var(--error)" :
        type === "success" ? "var(--success)" : "#64748b";
}

function setLoading(state) {
    if (state) {
        btn.classList.add("loading");
        btn.disabled = true;
        btnText.innerText = "Memproses...";
    } else {
        btn.classList.remove("loading");
        btn.disabled = false;
        btnText.innerHTML = '<i class="fab fa-pi"></i> Masuk dengan Pi';
    }
}

/* ===============================
   1. ROBUST CONFIG CHECKER
================================*/
// Menggunakan polling untuk menunggu config load, mencegah race condition
let configCheckInterval = setInterval(() => {
    if (window.APP_CONFIG) {
        clearInterval(configCheckInterval);
        console.log("✅ Config Loaded:", window.APP_CONFIG.PI.APP_ID);
        initSystem(); // Mulai inisialisasi sistem
    }
}, 100);

// Timeout safety: jika config tidak muncul dalam 5 detik
setTimeout(() => {
    if (!window.APP_CONFIG) {
        clearInterval(configCheckInterval);
        console.error("❌ FATAL: js/pi-config.js tidak ditemukan atau salah path.");
        setStatus("Error: Konfigurasi hilang (pi-config.js)", "error");
        btn.disabled = true;
    }
}, 5000);

/* ===============================
   2. INIT SYSTEM (SUPABASE + PI SDK)
================================*/
async function initSystem() {
    // A. Init Supabase
    if (window.supabase && window.APP_CONFIG.SUPABASE_URL) {
        try {
            _supabaseClient = window.supabase.createClient(
                window.APP_CONFIG.SUPABASE_URL,
                window.APP_CONFIG.SUPABASE_ANON_KEY
            );
            console.log("✅ Supabase Connected");
        } catch (err) {
            console.error("❌ Supabase Error:", err);
        }
    } else {
        console.warn("⚠️ Supabase library belum load");
    }

    // B. Init Pi SDK
    await initPi();
}

async function initPi() {
    if (piReady) return true;

    // Cek apakah object Pi ada di window
    if (typeof Pi === 'undefined') {
        console.error("❌ Pi SDK tidak ditemukan di window. Cek koneksi atau CDN.");
        setStatus("Gagal memuat Pi SDK. Cek koneksi internet.", "error");
        return false;
    }

    try {
        // Pastikan IS_SANDBOX bernilai boolean
        const sandboxMode = window.APP_CONFIG.IS_SANDBOX === true;

        // Perbaikan: Hanya kirim parameter sandbox untuk SDK v2.0
        await Pi.init({
            sandbox: sandboxMode
        });

        piReady = true;
        console.log("✅ Pi Init Success");
        return true;
    } catch (err) {
        console.error("❌ Pi Init Failed:", err);
        setStatus("Inisialisasi Pi Gagal: " + err.message, "error");
        return false;
    }
}

/* ===============================
   3. LOGIN HANDLER
================================*/
btn.addEventListener("click", async () => {
    // Validasi Config sebelum klik
    if(!window.APP_CONFIG) {
        setStatus("Config belum dimuat. Refresh halaman.", "error");
        return;
    }

    setStatus("Menghubungkan ke Pi Network...");
    setLoading(true);

    // Pastikan Pi siap
    const ready = await initPi();
    if (!ready) {
        setStatus("Pi SDK tidak siap. Cek Console.", "error");
        setLoading(false);
        return;
    }

    try {
        console.log("🚀 Memulai autentikasi...");
        
        // Panggil Authenticate
        const authResult = await Pi.authenticate(
            window.APP_CONFIG.PI.SCOPES,
            {
                onIncompletePaymentFound: (payment) => {
                    console.log("Payment tertunda ditemukan:", payment);
                }
            }
        );

        // Validasi Hasil
        if (!authResult || !authResult.user) {
            throw new Error("Login dibatalkan oleh user atau data kosong.");
        }

        const user = authResult.user;
        console.log("✅ Login Berhasil:", user);
        setStatus("Login Berhasil!", "success");

        // --- SIMPAN KE SUPABASE ---
        if (_supabaseClient) {
            try {
                // Cek user existing
                const { data: existing, error: checkError } = await _supabaseClient
                    .from("users")
                    .select("*")
                    .eq("wallet_address", user.uid)
                    .maybeSingle();

                if (checkError) throw checkError;

                // Insert jika belum ada
                if (!existing) {
                    const { error: insertError } = await _supabaseClient.from("users").insert([{
                        username: user.username || "Pioneer",
                        wallet_address: user.uid,
                        created_at: new Date()
                    }]);
                    
                    if (insertError) {
                        console.warn("Gagal simpan ke DB, tapi lanjut login local:", insertError.message);
                    } else {
                        console.log("✅ User tersimpan ke Database");
                    }
                } else {
                    console.log("ℹ️ User sudah terdaftar");
                }
            } catch (dbErr) {
                console.error("Database Error:", dbErr);
                // Kita tidak block login jika DB error, biarkan user masuk lewat local session
            }
        }

        // --- SIMPAN LOCAL SESSION ---
        localStorage.setItem("greenproof_user", JSON.stringify({
            uid: user.uid,
            username: user.username,
            token: authResult.accessToken
        }));

        // Redirect
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);

    } catch (err) {
        console.error("❌ Login Process Error:", err);
        setStatus("Error: " + err.message, "error");
        setLoading(false);
    }
});

</script>

</body>
</html>
