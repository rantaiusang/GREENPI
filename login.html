<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - GreenProof</title>

<!-- Pi SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<!-- Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    background:#1e293b;
    padding:40px;
    border-radius:20px;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:50px;
    background:#7b2cbf;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#5a189a;
}

#status{
    margin-top:15px;
    font-size:14px;
}
</style>

</head>
<body>

<div class="container">
<h2>Login GreenProof</h2>

<button id="loginBtn">
Masuk dengan Pi
</button>

<div id="status"></div>
</div>

<script>

/* ===========================
   CONFIG
=========================== */

const APP_CONFIG = {
    IS_SANDBOX: true,
    PI_APP_ID: "26949299605f32",
    SCOPES: ["username","payments"],

    SUPABASE_URL: "https://lrzaiftdikcjehtlbwlg.supabase.co",
    SUPABASE_ANON_KEY: "ISI_ANON_KEY_KAMU"
};


/* ===========================
   INIT SUPABASE
=========================== */

let supabase = null;

try{
    supabase = window.supabase.createClient(
        APP_CONFIG.SUPABASE_URL,
        APP_CONFIG.SUPABASE_ANON_KEY
    );
    console.log("✅ Supabase Ready");
}catch(err){
    console.error("Supabase Error:",err);
}


/* ===========================
   INIT PI SDK
=========================== */

let piReady = false;

async function initPi(){

    if(!window.Pi){
        console.error("Pi SDK tidak ditemukan");
        return false;
    }

    try{

        await Pi.init({
            version:"2.0",
            sandbox:APP_CONFIG.IS_SANDBOX
        });

        piReady = true;
        console.log("✅ Pi SDK Ready");
        return true;

    }catch(err){
        console.error("Pi Init Error:",err);
        return false;
    }
}

window.addEventListener("load", initPi);


/* ===========================
   LOGIN BUTTON
=========================== */

const btn = document.getElementById("loginBtn");
const status = document.getElementById("status");

btn.addEventListener("click", async ()=>{

    btn.disabled = true;
    status.innerText = "Connecting ke Pi...";

    if(!piReady){
        const ok = await initPi();
        if(!ok){
            status.innerText = "Pi SDK gagal init";
            btn.disabled = false;
            return;
        }
    }

    try{

        const auth = await Pi.authenticate(
            APP_CONFIG.SCOPES,
            {
                onIncompletePaymentFound:(payment)=>{
                    console.log("Payment tertunda:",payment);
                }
            }
        );

        if(!auth || !auth.user){
            throw new Error("Login dibatalkan");
        }

        const user = auth.user;

        status.innerText = "Login Sukses ✅";

        /* ======================
           SAVE KE LOCALSTORAGE
        ====================== */

        localStorage.setItem("greenproof_user", JSON.stringify({
            uid:user.uid,
            username:user.username,
            token:auth.accessToken
        }));


        /* ======================
           SYNC KE SUPABASE
        ====================== */

        if(supabase){

            await supabase
            .from("users")
            .upsert({
                wallet_address:user.uid,
                username:user.username
            });

            console.log("✅ User Sync DB");
        }

        setTimeout(()=>{
            window.location.href="dashboard.html";
        },1000);

    }catch(err){

        console.error("Login Error:",err);
        status.innerText = "Login Gagal: " + err.message;
        btn.disabled = false;
    }

});

</script>

</body>
</html>
