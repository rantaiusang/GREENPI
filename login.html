<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - GreenProof</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Load Pi Network SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <!-- Memuat Supabase dari CDN (untuk versi standalone ini) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --pi-purple: #7b2cbf;
            --pi-purple-dark: #5a189a;
            --bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #e0e7ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --error: #ef4444;
            --success: #10b981;
        }

        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            position: relative;
            overflow: hidden;
        }

        /* --- BACKGROUND ANIMATION SHAPES --- */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite ease-in-out;
        }
        .shape-1 {
            width: 400px; height: 400px;
            background: rgba(16, 185, 129, 0.2);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .shape-2 {
            width: 300px; height: 300px;
            background: rgba(123, 44, 191, 0.15);
            bottom: -50px; right: -50px;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 30px); }
        }

        /* --- LOGIN CARD --- */
        .login-card {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 420px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .login-card:hover { transform: translateY(-5px); }

        .logo-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
            display: inline-block;
            animation: pulse-green 2s infinite;
        }

        h1 { font-size: 1.8rem; color: var(--text-main); margin-bottom: 8px; font-weight: 700; }
        p.subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5; }

        /* --- BUTTON STYLES --- */
        .btn-pi {
            background: var(--pi-purple);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-pi::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .btn-pi:hover { background: var(--pi-purple-dark); box-shadow: 0 10px 20px rgba(123, 44, 191, 0.3); transform: translateY(-2px); }
        .btn-pi:hover::before { transform: translateX(100%); }
        .btn-pi:active { transform: translateY(0); }
        .btn-pi.disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
        
        /* State Classes untuk JS */
        .btn-pi.loading { background: var(--pi-purple); cursor: wait; }
        .btn-pi.success { background: var(--success); cursor: default; }
        .btn-pi.error { background: var(--error); cursor: default; }

        /* --- LOADING SPINNER --- */
        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none; /* Hidden by default */
        }
        .btn-pi.loading .spinner { display: block; }
        .btn-pi.loading .btn-text { opacity: 0.8; }
        .btn-pi.loading::before { display: none; } /* Hide shine effect saat loading */

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse-green { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* --- RESPONSIVE --- */
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Animated Background Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <!-- Login Card -->
    <div class="login-card">
        <div class="logo-icon"><i class="fas fa-leaf"></i></div>
        <h1>Selamat Datang</h1>
        <p class="subtitle">Bergabung dengan GreenProof.<br>Hubungkan dompet Pi Anda untuk memulai aksi hijau.</p>
        
        <button id="btn-login" class="btn-pi">
            <span class="btn-text"><i class="fab fa-pi"></i> Masuk dengan Pi Network</span>
            <div class="spinner"></div>
        </button>
        
        <p style="margin-top: 20px; font-size: 0.75rem; color: #94a3b8;">
            <i class="fas fa-lock"></i> Aman & Terenkripsi
        </p>
    </div>

    <!-- LOGIC (DITANAM LANGSUNG UNTUK MENGHINDARI ERROR 404) -->
    <script>
        // --- 1. KONFIGURASI ---
        const APP_CONFIG = {
            APP: {
                // GANTI dengan App ID Anda dari Pi Network Platform
                PI_APP_ID: "MASUKKAN_PI_APP_ID_ANDA_DISINI" 
            }
        };

        // --- 2. KONEKSI SUPABASE ---
        // GANTI dengan URL dan Key dari Dashboard Supabase Anda
        const SUPABASE_URL = "MASUKKAN_SUPABASE_URL_ANDA";
        const SUPABASE_KEY = "MASUKKAN_SUPABASE_ANON_KEY_ANDA";
        
        let supabase;
        try {
            if (SUPABASE_URL === "MASUKKAN_SUPABASE_URL_ANDA") {
                console.warn("Supabase belum dikonfigurasi. Login mode simulasi (mock) akan dijalankan.");
            } else {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (e) {
            console.error("Gagal menginisialisasi Supabase:", e);
        }

        // --- 3. LOGIKA TAMPILAN (UI) ---
        const btnLogin = document.getElementById('btn-login');
        const btnText = document.querySelector('.btn-text');
        const spinner = document.querySelector('.spinner');

        function setButtonState(state) {
            btnLogin.className = 'btn-pi';
            
            if (state === 'loading') {
                btnLogin.classList.add('loading');
                btnLogin.disabled = true;
            } else if (state === 'success') {
                btnLogin.classList.add('success');
                btnLogin.innerHTML = `<span class="btn-text"><i class="fas fa-check"></i> Berhasil Masuk!</span>`;
                spinner.style.display = 'none';
            } else if (state === 'error') {
                btnLogin.classList.add('error');
                btnLogin.innerHTML = `<span class="btn-text"><i class="fas fa-times"></i> Coba Lagi</span>`;
                spinner.style.display = 'none';
            } else {
                // Kembali ke kondisi awal (Idle)
                btnLogin.innerHTML = `<span class="btn-text"><i class="fab fa-pi"></i> Masuk dengan Pi Network</span><div class="spinner"></div>`;
                spinner.style.display = 'none';
                btnLogin.disabled = false;
            }
        }

        // --- 4. LOGIKA OTENTIKASI ---
        btnLogin.addEventListener('click', async () => {
            setButtonState('loading');

            try {
                const appId = APP_CONFIG.APP.PI_APP_ID;
                
                // MODE SIMULASI (Jika pengguna belum mengisi Konfigurasi)
                if (appId === "MASUKKAN_PI_APP_ID_ANDA_DISINI") {
                    console.warn("Menjalankan mode SIMULASI karena App ID belum diisi.");
                    await new Promise(r => setTimeout(r, 1500)); // Purapura loading
                    
                    const mockUser = {
                        uid: "MOCK_UID_12345",
                        username: "PioneerSimulasi",
                        accessToken: "mock_token_xyz"
                    };
                    
                    // Simpan sesi simulasi
                    localStorage.setItem('greenproof_user', JSON.stringify({
                        id: "local-id",
                        pi_uid: mockUser.uid,
                        username: mockUser.username,
                        accessToken: mockUser.accessToken
                    }));

                    setButtonState('success');
                    setTimeout(() => {
                        // Mencoba pindah ke dashboard.html
                        window.location.href = 'dashboard.html'; 
                    }, 1000);
                    return;
                }

                // OTENTIKASI PI NETWORK ASLI
                const Pi = window.Pi || window.PiNetwork;
                if (!Pi) throw new Error("Pi Network SDK gagal dimuat.");

                // Inisialisasi SDK
                Pi.init(appId);

                // Lakukan Autentikasi
                const authResult = await Pi.authenticate(['username', 'payments'], {
                    onIncompletePaymentFound: (payment) => {
                        console.log("Pembayaran tidak lengkap ditemukan:", payment);
                    }
                });

                if (!authResult.user) throw new Error("Autentikasi dibatalkan oleh pengguna.");

                const piUser = authResult.user;
                console.log("Pengguna Pi:", piUser);

                // --- SINKRONISASI DATABASE (Opsional: Jalan hanya jika Supabase dikonfigurasi) ---
                let finalUserId = piUser.uid; // Default pakai Pi UID
                
                if (supabase) {
                    const { data: dbUser, error } = await supabase
                        .from('users')
                        .select('*')
                        .eq('wallet_address', piUser.uid)
                        .maybeSingle();

                    if (!dbUser && !error) {
                        // Daftarkan pengguna baru
                        const { data: newUser, error: insertError } = await supabase
                            .from('users')
                            .insert([{
                                id: crypto.randomUUID(),
                                username: piUser.username || 'Pioneer',
                                wallet_address: piUser.uid,
                                reputation: 100,
                                status: 'active'
                            }])
                            .select();
                        
                        if (newUser && newUser.length > 0) finalUserId = newUser[0].id;
                    } else if (dbUser) {
                        finalUserId = dbUser.id;
                    }
                }

                // Simpan Sesi
                localStorage.setItem('greenproof_user', JSON.stringify({
                    id: finalUserId,
                    pi_uid: piUser.uid,
                    username: piUser.username || 'Pioneer',
                    accessToken: authResult.accessToken
                }));

                setButtonState('success');
                setTimeout(() => window.location.href = 'dashboard.html', 1200);

            } catch (error) {
                console.error("Error Login:", error);
                setButtonState('error');
                
                // Mengaktifkan ulang tombol setelah error
                setTimeout(() => {
                    setButtonState('idle');
                }, 2000);
            }
        });
    </script>
</body>
</html>
