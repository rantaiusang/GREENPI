<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absolute Final Payment</title>

<!-- 1. LOAD CONFIG DULU -->
<script src="js/pi-config.js"></script>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{ font-family: sans-serif; background:#0f172a; color:white; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
.container{ text-align:center; background:#1e293b; padding:30px; border-radius:20px; width:90%; max-width:380px; }
button{ width:100%; padding:14px; border:none; border-radius:50px; margin-top:15px; font-weight:bold; cursor:pointer; color:white; transition:0.2s;}
#authBtn{ background:#7b2cbf; }
#payBtn{ background:#10b981; }
#status{ margin-top:20px; font-size:12px; background:#000; color:#10b981; padding:12px; border-radius:8px; min-height:70px; white-space:pre-line; font-family:monospace; border:1px solid #333; }
</style>
</head>
<body>

<div class="container">
<h2 id="app-title">Production Payment</h2>
<p style="font-size:12px; color:#94a3b8;">Absolute Final Solution</p>

<button id="authBtn" disabled>1. Login</button>
<button id="payBtn" disabled>2. Bayar 0.01 Pi</button>

<div id="status">Memuat Config...</div>
</div>

<script>
/* ============================================================
   INISIALISASI VARIABEL DARI CONFIG
============================================================ */
if(!window.APP_CONFIG) {
    throw new Error("pi-config.js tidak ditemukan! Pastikan file ada di folder js/");
}

const BACKEND_URL = "https://lrzaiftdikcjehtlbwlg.supabase.co/functions/v1/handle-payment"; 
const AUTH_TOKEN = "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyemFpZnRkaWtjamVodGxid2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NzU0MzgsImV4cCI6MjA4NzI1MTQzOH0.TWD0Te1E7ELpBBrmWapvjZKyqvWerxl90vtmyvucNFc";

const APP_ID = window.APP_CONFIG.PI.APP_ID;
const SDK_VERSION = window.APP_CONFIG.PI.SDK_VERSION;
const IS_SANDBOX = window.APP_CONFIG.IS_SANDBOX;

document.getElementById("app-title").innerText = IS_SANDBOX ? "Sandbox Payment" : "Production Payment";

let authResult = null;
let isCheckingPending = false;

const statusDiv = document.getElementById("status");
const authBtn = document.getElementById("authBtn");
const payBtn = document.getElementById("payBtn");

function log(msg) { 
    console.log(msg); 
    statusDiv.innerText = msg; 
}

/* ============================================================
   INIT SDK
============================================================ */
window.addEventListener("load", async () => {
    if (typeof Pi === 'undefined') {
        return log("❌ FATAL: Script Pi SDK tidak terbaca.");
    }

    try {
        await Pi.init({ 
            version: SDK_VERSION, 
            sandbox: IS_SANDBOX
        });
        
        localStorage.removeItem("greenproof_user");
        log(`✅ SDK Ready (${IS_SANDBOX ? 'Sandbox' : 'Mainnet'}).`);
        authBtn.disabled = false;
    } catch(e) { 
        log("Init Error: " + e.message); 
    }
});

/* ============================================================
   AUTHENTICATION
============================================================ */
authBtn.addEventListener("click", async () => {
    authBtn.disabled = true;
    log("🔐 Melakukan Login...");
    
    try {
        authResult = await Pi.authenticate(window.APP_CONFIG.PI.SCOPES);
        
        localStorage.setItem("greenproof_user", JSON.stringify({
            uid: authResult.user.uid,
            username: authResult.user.username,
            token: authResult.accessToken
        }));
        
        log("✅ Login OK!\nUser: " + authResult.user.username);
        payBtn.disabled = false;
        authBtn.innerText = "✅ Siap";

        // Cek Pending Payment
        await resolvePendingPayments();

    } catch(e) { 
        log("Auth Gagal: " + e.message); 
        authBtn.disabled = false; 
    }
});

/* ============================================================
   FUNGSI KHUSUS: SELESAIKAN PEMBAYARAN MENGANTUNG
============================================================ */
async function resolvePendingPayments() {
    if(isCheckingPending) return;
    isCheckingPending = true;
    log("🔍 Memeriksa pembayaran tertunda...");

    try {
        await Pi.createPayment({
            amount: 0.01,
            memo: "Check_Pending",
            metadata: { check: true }
        }, {
            onIncompletePaymentFound: async (payment) => {
                log("⚠️ DITEMUKAN PEMBAYARAN MACET!\nID: " + payment.identifier);
                log("🔄 Sedang memaksa selesaikan...");
                
                try {
                    // 🔥 KIRIM isSandbox AGAR BACKEND PAKAI API KEY YANG BENAR
                    const res = await fetch(BACKEND_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            action: "complete",
                            paymentId: payment.identifier,
                            txid: payment.transaction_id || null,
                            isSandbox: IS_SANDBOX // <--- PENTING
                        })
                    });

                    if(res.ok) {
                        log("✅ BERHASIL MEMBUNUH PEMBAYARAN MACET!");
                        alert("Pembayaran tertunda telah diselesaikan.");
                        setTimeout(() => location.reload(), 2000);
                    } else {
                        log("❌ Gagal membersihkan payment macet di server.");
                    }
                } catch (err) {
                    log("❌ Error: " + err.message);
                }
            },
            onError: (err) => { console.log("✅ Tidak ada payment mengantung."); },
            onCancel: (paymentId) => { console.log("✅ Pengecekan selesai (Cancel)."); }
        });

    } catch (error) {
        console.log("Flow Pengecekan Selesai");
    } finally {
        isCheckingPending = false;
    }
}

/* ============================================================
   PAYMENT LOGIC (BUAT BARU)
============================================================ */
payBtn.addEventListener("click", async () => {
    if(!authResult) return log("❌ Login dulu!");
    if(isCheckingPending) return log("⚠️ Masih mengecek payment lama... tunggu bentar.");
    
    payBtn.disabled = true;
    log("🔄 Memulai Transaksi Baru...");

    try {
        const paymentCallbacks = {
            
            onReadyForServerApproval: async (paymentId) => {
                log("✅ User Approved.\nMenghubungi Backend...");
                try {
                    const res = await fetch(BACKEND_URL, {
                        method: "POST",
                        headers: { 
                            "Content-Type": "application/json",
                            "Authorization": AUTH_TOKEN
                        },
                        // 🔥 KIRIM isSandbox UNTUK APPROVE JUGA
                        body: JSON.stringify({ 
                            paymentId, 
                            action: "approve",
                            isSandbox: IS_SANDBOX 
                        })
                    });
                    
                    if(!res.ok) throw new Error("Backend Approve Gagal");
                    log("✅ Backend Approve Sukses!");
                } catch (err) {
                    log("❌ Error Approve: " + err.message);
                }
            },

            onReadyForServerCompletion: async (paymentId, txid) => {
                log("🔄 Menghubungi Backend (COMPLETE)...");
                try {
                    const res = await fetch(BACKEND_URL, {
                        method: "POST",
                        headers: { 
                            "Content-Type": "application/json",
                            "Authorization": AUTH_TOKEN
                        },
                        // 🔥 KIRIM isSandbox UNTUK COMPLETE
                        body: JSON.stringify({ 
                            paymentId, 
                            action: "complete", 
                            txid: txid,
                            isSandbox: IS_SANDBOX 
                        })
                    });
                    
                    if(!res.ok) throw new Error("Backend Complete Gagal");
                    log("🎉 TRANSAKSI SELESAI!\nTxID: " + txid);
                    payBtn.innerText = "✅ SUKSES";
                } catch (err) {
                    log("❌ Error Complete: " + err.message);
                }
            },

            onCancel: (paymentId) => {
                log("⚠️ Transaksi Dibatalkan User.");
                payBtn.disabled = false;
            },

            onError: (error, payment) => {
                log("❌ Error Transaksi: " + error.message);
                payBtn.disabled = false;
            }
        };

        const payment = await Pi.createPayment({
            amount: 0.01,
            memo: "Pembayaran Baru",
            metadata: { 
                userId: authResult.user.uid,
                username: authResult.user.username,
                timestamp: Date.now()
            }
        }, paymentCallbacks);

    } catch (error) {
        log("❌ Gagal Create Payment: " + error.message);
        payBtn.disabled = false;
    }
});
</script>
   
</body>
</html>
